<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出数表入力</title>
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="出数表入力">
  <link rel="icon" href="images/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="app-body">
  <main class="app-main" id="contentArea">
    <div class="portal-loading" role="status" aria-live="polite">
      <div class="portal-loading-card">
        <div class="portal-loading-logo-wrap">
          <div class="portal-loading-ring" aria-hidden="true"></div>
          <img src="images/seki-logo.png" alt="" class="portal-loading-logo" width="56" height="56" decoding="async" fetchpriority="high">
        </div>
        <p class="portal-loading-brand">出数表入力</p>
        <p class="portal-loading-message">データを読み込んでいます…</p>
        <div class="portal-loading-dots" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/links.js"></script>
  <script src="js/data/errors.js"></script>
  <script src="js/data/normalize.js"></script>
  <script src="js/data/json-provider.js"></script>
  <script src="js/data/apps-script-provider.js"></script>
  <script src="js/data/provider.js"></script>
  <script src="script.js"></script>
</body>
</html>
